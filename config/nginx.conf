sudo bash -c 'cat > /etc/nginx/sites-available/kbtool << EOF
server {
    listen 80;
    server_name vinnyclasifiervm.eastus.cloudapp.azure.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host \$host;
        proxy_set_header X-Forwarded-For \$remote_addr;
    }

    location = /get_kb_candidates {
        proxy_pass http://127.0.0.1:8000/get_kb_candidates;
        proxy_set_header Host \$host;
        proxy_set_header X-Forwarded-For \$remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
EOF'